services:
  rolling-context-test:
    build:
      context: ..
      dockerfile: test/Dockerfile
    container_name: rolling-context-test
    stdin_open: true
    tty: true
    volumes:
      # Mount credentials from host
      - ${HOME}/.claude/.credentials.json:/home/testuser/.claude/.credentials.json:ro
      # Mount a test workspace
      - ./workspace:/workspace
    environment:
      - ROLLING_CONTEXT_MODEL=claude-haiku-latest
      # Low trigger for testing — see compression happen fast
      - ROLLING_CONTEXT_TRIGGER=5000
      - ROLLING_CONTEXT_TARGET=2500
